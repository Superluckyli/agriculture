server:
  port: 8080

spring:
  application:
    name: agri-system
  datasource:
    url: jdbc:mysql://localhost:3306/agri_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:lizhuoer513}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: '0'
    encoding: UTF-8
    validate-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:AgriSystemKey_123456}
  ttl-hours: ${JWT_TTL_HOURS:24}
