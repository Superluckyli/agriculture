openapi: 3.0.3
info:
  title: Agri System API Contract
  version: 1.0.0
  description: |
    Frontend integration contract generated from current Spring Boot + MyBatis-Plus controllers/services.

    Unified response wrapper:
    R<T> = { code:number, msg:string, data:T }
    - business success: code = 200
    - business failure: code != 200 (common: 500)

    Pagination response shape:
    data = { current:number, size:number, total:number, records:T[] }

    Authentication:
    Authorization: Bearer <token>
servers:
  - url: http://localhost:8080
tags:
  - name: Auth
  - name: SystemUser
  - name: SystemRole
  - name: SystemMenu
  - name: CropVariety
  - name: CropBatch
  - name: GrowthLog
  - name: IotRule
  - name: IotData
  - name: Task
  - name: TaskLog
  - name: MaterialInfo
  - name: MaterialLog
  - name: Report
paths:
  /login:
    post:
      tags: [Auth]
      summary: User login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginBody'
            example:
              username: admin
              password: "123456"
      responses:
        '200':
          description: Login result (R<LoginData>)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/R'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginData'
              example:
                code: 200
                msg: Login success
                data:
                  token: eyJhbGciOiJIUzI1NiJ9.mock
                  user:
                    userId: 1
                    username: admin
                    password: "123456"
                    realName: System Admin
                    phone: "13800000001"
                    deptName: IT
                    status: 1
                    createTime: "2026-02-28T10:00:00"
        '500':
          $ref: '#/components/responses/BizFail'
  /register:
    post:
      tags: [Auth]
      summary: User register
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysUser'
            example:
              username: demo_user
              password: "123456"
              realName: Demo User
              phone: "13800009999"
              deptName: Demo
              status: 1
      responses:
        '200':
          description: Register result (R<Void>)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Register success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'

  /system/user/list:
    get:
      tags: [SystemUser]
      summary: List users (paged)
      operationId: listUsers
      parameters:
        - in: query
          name: pageNum
          schema:
            type: integer
            default: 1
          example: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 10
          example: 10
        - in: query
          name: username
          schema:
            type: string
          example: farmer
        - in: query
          name: realName
          schema:
            type: string
          example: Li
        - in: query
          name: status
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: R<Page<SysUser>>
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/R'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageSysUser'
              example:
                code: 200
                msg: Operation success
                data:
                  current: 1
                  size: 10
                  total: 1
                  records:
                    - userId: 3
                      username: farmer1
                      password: "123456"
                      realName: Farmer One
                      phone: "13800000003"
                      deptName: Planting Team
                      status: 1
                      createTime: "2026-02-28T09:00:00"
        '500':
          $ref: '#/components/responses/BizFail'
  /system/user/{userId}:
    get:
      tags: [SystemUser]
      summary: Get user detail
      operationId: getUserDetail
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
            format: int64
          example: 3
      responses:
        '200':
          description: R<SysUser>
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/R'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SysUser'
              example:
                code: 200
                msg: Operation success
                data:
                  userId: 3
                  username: farmer1
                  password: "123456"
                  realName: Farmer One
                  phone: "13800000003"
                  deptName: Planting Team
                  status: 1
                  createTime: "2026-02-28T09:00:00"
        '500':
          $ref: '#/components/responses/BizFail'
    delete:
      tags: [SystemUser]
      summary: Delete users by CSV ids
      operationId: deleteUsers
      parameters:
        - in: path
          name: userIds
          required: true
          schema:
            type: string
          description: Comma-separated ids, e.g. 3,4
          example: 3,4
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'
  /system/user:
    post:
      tags: [SystemUser]
      summary: Create user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysUser'
            example:
              username: farmer_new
              password: "123456"
              realName: New Farmer
              phone: "13800001111"
              deptName: Farm A
              status: 1
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'
    put:
      tags: [SystemUser]
      summary: Update user
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysUser'
            example:
              userId: 3
              realName: Farmer One Updated
              phone: "13800003333"
              deptName: Planting Team
              status: 1
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'

  /system/role/list:
    get:
      tags: [SystemRole]
      summary: List roles (paged)
      operationId: listRoles
      parameters:
        - in: query
          name: pageNum
          schema:
            type: integer
            default: 1
          example: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 10
          example: 10
        - in: query
          name: roleName
          schema:
            type: string
          example: FARM
      responses:
        '200':
          description: R<Page<SysRole>>
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/R'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageSysRole'
              example:
                code: 200
                msg: Operation success
                data:
                  current: 1
                  size: 10
                  total: 1
                  records:
                    - roleId: 3
                      roleName: Farmer
                      roleKey: FARMER
                      createTime: "2026-02-28T09:00:00"
        '500':
          $ref: '#/components/responses/BizFail'
  /system/role:
    post:
      tags: [SystemRole]
      summary: Create role
      operationId: createRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysRole'
            example:
              roleName: Agronomist
              roleKey: AGRONOMIST
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'
    put:
      tags: [SystemRole]
      summary: Update role
      operationId: updateRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysRole'
            example:
              roleId: 6
              roleName: Demo Role
              roleKey: DEMO
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'
  /system/role/{roleIds}:
    delete:
      tags: [SystemRole]
      summary: Delete roles by CSV ids
      description: |
        Role deletion rule:
        sys_user_role is many-to-many. Before deleting a role, bound user count must be checked.
        If bound count > 0, deletion is forbidden and returns code != 200.
      operationId: deleteRole
      parameters:
        - in: path
          name: roleIds
          required: true
          schema:
            type: string
          description: Comma-separated role ids, e.g. 3,4
          example: 6
      responses:
        '200':
          description: R<Void> (success or business-fail in body code)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              examples:
                success:
                  value:
                    code: 200
                    msg: Operation success
                    data: null
                boundFail:
                  value:
                    code: 500
                    msg: Role is bound by users, unbind first
                    data: null
        '500':
          $ref: '#/components/responses/BizFail'

  /system/menu/list:
    get:
      tags: [SystemMenu]
      summary: List menus
      operationId: listMenus
      responses:
        '200':
          description: R<List<SysMenu>>
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/R'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SysMenu'
              example:
                code: 200
                msg: Operation success
                data:
                  - menuId: 1
                    parentId: 0
                    menuName: Dashboard
                    path: /dashboard
                    perms: report:view
                    type: 1
                    orderNum: 1
        '500':
          $ref: '#/components/responses/BizFail'
  /system/menu:
    post:
      tags: [SystemMenu]
      summary: Create menu
      operationId: createMenu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysMenu'
            example:
              parentId: 0
              menuName: Tasks
              path: /task
              perms: task:view
              type: 1
              orderNum: 2
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'
    put:
      tags: [SystemMenu]
      summary: Update menu
      operationId: updateMenu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SysMenu'
            example:
              menuId: 2
              menuName: Task Center
              path: /task
              perms: task:manage
              type: 1
              orderNum: 2
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'
  /system/menu/{menuId}:
    delete:
      tags: [SystemMenu]
      summary: Delete menu
      operationId: deleteMenu
      parameters:
        - in: path
          name: menuId
          required: true
          schema:
            type: integer
            format: int64
          example: 2
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'

  /crop/variety/list:
    get:
      tags: [CropVariety]
      summary: List crop varieties (paged)
      operationId: listCropVarieties
      parameters:
        - in: query
          name: pageNum
          schema:
            type: integer
            default: 1
          example: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 10
          example: 10
        - in: query
          name: cropName
          schema:
            type: string
          example: wheat
      responses:
        '200':
          description: R<Page<BaseCropVariety>>
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/R'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageBaseCropVariety'
              example:
                code: 200
                msg: Operation success
                data:
                  current: 1
                  size: 10
                  total: 1
                  records:
                    - varietyId: 1
                      cropName: Wheat
                      growthCycleDays: 120
                      idealHumidityMin: 40.0
                      idealHumidityMax: 70.0
                      idealTempMin: 10.0
                      idealTempMax: 25.0
                      createTime: "2026-02-28T09:00:00"
        '500':
          $ref: '#/components/responses/BizFail'
  /crop/variety/all:
    get:
      tags: [CropVariety]
      summary: List all crop varieties
      operationId: listAllCropVarieties
      responses:
        '200':
          description: R<List<BaseCropVariety>>
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/R'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/BaseCropVariety'
              example:
                code: 200
                msg: Operation success
                data:
                  - varietyId: 1
                    cropName: Wheat
                    growthCycleDays: 120
                    idealHumidityMin: 40.0
                    idealHumidityMax: 70.0
                    idealTempMin: 10.0
                    idealTempMax: 25.0
                    createTime: "2026-02-28T09:00:00"
        '500':
          $ref: '#/components/responses/BizFail'
  /crop/variety:
    post:
      tags: [CropVariety]
      summary: Create crop variety
      operationId: createCropVariety
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseCropVariety'
            example:
              cropName: Rice
              growthCycleDays: 150
              idealHumidityMin: 60
              idealHumidityMax: 90
              idealTempMin: 15
              idealTempMax: 30
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'
    put:
      tags: [CropVariety]
      summary: Update crop variety
      operationId: updateCropVariety
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseCropVariety'
            example:
              varietyId: 1
              cropName: Rice Pro
              growthCycleDays: 145
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'
  /crop/variety/{ids}:
    delete:
      tags: [CropVariety]
      summary: Delete crop varieties by CSV ids
      operationId: deleteCropVariety
      parameters:
        - in: path
          name: ids
          required: true
          schema:
            type: string
          example: 1,2
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'

  /crop/batch/list:
    get:
      tags: [CropBatch]
      summary: List crop batches (paged)
      operationId: listCropBatches
      parameters:
        - in: query
          name: pageNum
          schema:
            type: integer
            default: 1
          example: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 10
          example: 10
        - in: query
          name: plotId
          schema:
            type: string
          example: PLOT-A01
        - in: query
          name: currentStage
          schema:
            type: string
          example: Tillering
      responses:
        '200':
          description: R<Page<CropBatch>>
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/R'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageCropBatch'
              example:
                code: 200
                msg: Operation success
                data:
                  current: 1
                  size: 10
                  total: 1
                  records:
                    - batchId: 1
                      varietyId: 1
                      plotId: PLOT-A01
                      sowingDate: "2026-01-10"
                      expectedHarvestDate: "2026-06-10"
                      currentStage: Tillering
                      isActive: 1
                      cropName: Rice
        '500':
          $ref: '#/components/responses/BizFail'
  /crop/batch:
    post:
      tags: [CropBatch]
      summary: Create crop batch
      operationId: createCropBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CropBatch'
            example:
              varietyId: 1
              plotId: PLOT-D01
              sowingDate: "2026-03-01"
              expectedHarvestDate: "2026-07-15"
              currentStage: Seedling
              isActive: 1
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'
    put:
      tags: [CropBatch]
      summary: Update crop batch
      operationId: updateCropBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CropBatch'
            example:
              batchId: 1
              currentStage: Jointing
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'
  /crop/batch/{ids}:
    delete:
      tags: [CropBatch]
      summary: Delete crop batches by CSV ids
      operationId: deleteCropBatch
      parameters:
        - in: path
          name: ids
          required: true
          schema:
            type: string
          example: 1,2
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'

  /crop/growth-log/list/{batchId}:
    get:
      tags: [GrowthLog]
      summary: List growth logs by batch id
      operationId: listGrowthLogs
      parameters:
        - in: path
          name: batchId
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: R<List<GrowthStageLog>>
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/R'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/GrowthStageLog'
              example:
                code: 200
                msg: Operation success
                data:
                  - logId: 1
                    batchId: 1
                    stageName: Seedling
                    logDate: "2026-02-28T08:00:00"
                    imageUrl: ""
                    description: Healthy growth
        '500':
          $ref: '#/components/responses/BizFail'
  /crop/growth-log:
    post:
      tags: [GrowthLog]
      summary: Create growth log
      operationId: createGrowthLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrowthStageLog'
            example:
              batchId: 1
              stageName: Tillering
              logDate: "2026-02-28T08:00:00"
              imageUrl: https://example.com/growth.jpg
              description: Entered tillering stage
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'

  /iot/rule/list:
    get:
      tags: [IotRule]
      summary: List IoT task rules (paged)
      operationId: listIotRules
      parameters:
        - in: query
          name: pageNum
          schema:
            type: integer
            default: 1
          example: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 10
          example: 10
      responses:
        '200':
          description: R<Page<AgriTaskRule>>
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/R'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageAgriTaskRule'
              example:
                code: 200
                msg: Operation success
                data:
                  current: 1
                  size: 10
                  total: 1
                  records:
                    - ruleId: 1
                      ruleName: Low Temperature Alert
                      sensorType: temperature
                      minVal: 0
                      maxVal: 10
                      autoTaskType: KeepWarm
                      priority: 2
                      isEnable: 1
        '500':
          $ref: '#/components/responses/BizFail'
  /iot/rule:
    post:
      tags: [IotRule]
      summary: Create IoT task rule
      operationId: createIotRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgriTaskRule'
            example:
              ruleName: Dry Soil Alert
              sensorType: humidity
              minVal: 0
              maxVal: 30
              autoTaskType: Irrigate
              priority: 2
              isEnable: 1
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'
    put:
      tags: [IotRule]
      summary: Update IoT task rule
      operationId: updateIotRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgriTaskRule'
            example:
              ruleId: 1
              ruleName: Low Temperature Alert Updated
              sensorType: temperature
              minVal: 0
              maxVal: 8
              autoTaskType: KeepWarm
              priority: 1
              isEnable: 1
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '500':
          $ref: '#/components/responses/BizFail'
  /iot/rule/{id}:
    delete:
