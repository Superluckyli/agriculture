components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BizFail:
      description: Business failure (R<Void>, code != 200)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RVoid'
          example:
            code: 500
            msg: Operation failed
            data: null
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RVoid'
          example:
            code: 401
            msg: Please login first
            data: null
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RVoid'
          example:
            code: 400
            msg: taskId 和 executorId 不能为空
            data: null
  schemas:
    R:
      type: object
      properties:
        code:
          type: integer
          description: Business code, 200 success, non-200 fail
        msg:
          type: string
        data:
          nullable: true
      required: [code, msg, data]
    RVoid:
      allOf:
        - $ref: '#/components/schemas/R'
        - type: object
          properties:
            data:
              nullable: true
              example: null

    PageBase:
      type: object
      properties:
        current:
          type: integer
          format: int64
        size:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
      required: [current, size, total]
    PageSysUser:
      allOf:
        - $ref: '#/components/schemas/PageBase'
        - type: object
          properties:
            records:
              type: array
              items:
                $ref: '#/components/schemas/SysUser'
          required: [records]
    PageSysRole:
      allOf:
        - $ref: '#/components/schemas/PageBase'
        - type: object
          properties:
            records:
              type: array
              items:
                $ref: '#/components/schemas/SysRole'
          required: [records]
    PageBaseCropVariety:
      allOf:
        - $ref: '#/components/schemas/PageBase'
        - type: object
          properties:
            records:
              type: array
              items:
                $ref: '#/components/schemas/BaseCropVariety'
          required: [records]
    PageCropBatch:
