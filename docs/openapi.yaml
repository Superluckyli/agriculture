  /task/assign:
    put:
      tags: [Task]
      summary: Assign task (ADMIN/FARM_OWNER, FARMER:0->1, WORKER:0->2)
      description: |
        Closed-loop dispatch endpoint:
        - role required: ADMIN or FARM_OWNER
        - target user must be active FARMER or WORKER
        - target role mismatch returns business error: 仅支持派给 FARMER/WORKER
        - status transition:
          - assign to FARMER: pending_assign(0) -> pending_accept(1)
          - assign to WORKER: pending_assign(0) -> accepted(2)
      operationId: assignTask
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Trace-Id
          schema:
            type: string
          required: false
          example: trace-assign-001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskAssignDTO'
            example:
              taskId: 1
              executorId: 3
              remark: Please handle today
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/BizFail'
  /task/accept:
    post:
      tags: [Task]
      summary: Accept task (FARMER assignee only, 1 -> 2)
      description: |
        Closed-loop dispatch endpoint:
        - role required: FARMER
        - must be assigned farmer
        - status transition: pending_accept(1) -> accepted(2)
        - WORKER calling this endpoint returns business error:
          WORKER无需接单/拒单，请直接执行任务
      operationId: acceptTask
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Trace-Id
          schema:
            type: string
          required: false
          example: trace-accept-001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskAcceptDTO'
            example:
              taskId: 1
      responses:
        '200':
          description: R<Void>
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVoid'
              example:
                code: 200
                msg: Operation success
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/BizFail'
  /task/reject:
